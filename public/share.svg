<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1622"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)" opacity="0.3"/>
  <rect x="60" y="180" width="6" height="200" rx="3" fill="url(#accent)"/>
  <text x="90" y="270" fill="white" font-family="Arial Black,Helvetica Neue,sans-serif" font-size="80" font-weight="900">MiruroAPI</text>
  <text x="90" y="340" fill="#94a3b8" font-family="Arial,Helvetica Neue,sans-serif" font-size="32">Free Anime Streaming API</text>
  <text x="90" y="390" fill="#64748b" font-family="Arial,Helvetica Neue,sans-serif" font-size="24">AniList GraphQL + Miruro Streaming Providers + M3U8</text>
  <rect x="60" y="430" width="280" height="50" rx="25" fill="url(#accent)" opacity="0.15"/>
  <text x="200" y="462" text-anchor="middle" fill="#38bdf8" font-family="Arial,sans-serif" font-size="20" font-weight="600">16 Endpoints</text>
  <rect x="360" y="430" width="280" height="50" rx="25" fill="url(#accent)" opacity="0.15"/>
  <text x="500" y="462" text-anchor="middle" fill="#38bdf8" font-family="Arial,sans-serif" font-size="20" font-weight="600">12 Providers</text>
  <rect x="660" y="430" width="280" height="50" rx="25" fill="url(#accent)" opacity="0.15"/>
  <text x="800" y="462" text-anchor="middle" fill="#38bdf8" font-family="Arial,sans-serif" font-size="20" font-weight="600">M3U8 Streaming</text>
  <rect x="960" y="430" width="200" height="50" rx="25" fill="url(#accent)" opacity="0.15"/>
  <text x="1060" y="462" text-anchor="middle" fill="#38bdf8" font-family="Arial,sans-serif" font-size="20" font-weight="600">v1.1.0</text>
  <rect x="900" y="120" width="200" height="200" rx="40" fill="url(#icon)" opacity="0.15"/>
  <text x="1000" y="255" text-anchor="middle" fill="white" font-family="Arial Black,sans-serif" font-size="120" font-weight="900">M</text>
  <text x="600" y="580" text-anchor="middle" fill="#475569" font-family="Arial,sans-serif" font-size="18">mirurotvapi.vercel.app</text>
